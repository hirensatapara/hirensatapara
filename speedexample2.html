<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:1px;
            margin:1px;
            border-radius:10px;
        }
        .container{
            display: flex;
            padding: 10px;
        }
        .container div{
            border:1px solid black;
            background-color:rgb(121,180,204);
            flex:1;
            padding: 10px;
            display: flex;
            justify-content: center;
            position:sticky;
            right:10px;
            font-size: 30px;
        }
        @media screen and (max-width:640px){
            .container div{
                border:none;
                background-image:linear-gradient(to right,rgb(4,229,236),rgb(3,3,3));
                color:rgb(255,255,255);
                text-aling:center;
                font-weight:bolder;
                font-family:sans-serif;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div>houme</div>
        <div>About</div>
        <div>Course</div>
        <div>Contect</div>
    </div>
</body>
</html>
