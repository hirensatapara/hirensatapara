<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>javascript const</h2>
    <p id="demo"></p>
    <script>
        try{
            const pi=3.141592653589793;
            pi = 3.14;
        }
        catch(err) 
        {
            document.getElementById("demo").innerHTML = err;
        }
    </script>
</body>
</html>
