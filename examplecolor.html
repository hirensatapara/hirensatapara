<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gradiant</title>
    <style>
        .main {

            display: flex;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
         text-align: center;
         font-size: 25px;
         font-style:oblique;
        }

        #gradient {
            height: 400px;
            width: 400px;
            margin: 5px;
        }
        

        .linear-gradient {
            background-image: linear-gradient(green, yellow);

        }
        .Radial-gradient{
            background-image: Radial-gradient(red,yellow,green);
        }
         .conic-gradient{
    background-image: conic-gradient(blue,yellow,red);
      }
          
    </style>
</head>

<body>
    <div class="main">
        <div class="linear-gradient" id="gradient">
            <h1>Linear-Gradient</h1>
        </div>
        <div class="Radial-gradient" id="gradient">
            <h1>Radial-Gradient</h1>
        </div>
        <div class="conic-gradient" id="gradient">
            <h1>conic-Gradient</h1>
        </div>
    </div>
</body>

</html>
