<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main div{
            border:1px solid black;
            text-align:center;
            font-size: 35px;
        }
        .two{
            grid-column: 2/5;
        }
        .three{
            grid-column: 1/5;
        }
        .four{
            grid-column: 1/3;
            grid-row: 3/5;
        }
        .five{
            grid-column: 3/4;
            grid-row: 3/5;
        }
        .eight{
            grid-column: 1/5;
        }
    </style>
</head>
<body>
      <div class="main">
        <div class="one" style="background-color: rgb(177, 221, 19);">one</div>
        <div class="two" style="background-color: rgb(17, 189, 212);">two</div>
        <div class="three" style="background-color: rgb(205, 5, 195);">three</div>
        <div class="four" style="background-color: rgb(10, 114, 188);">four</div>
        <div class="five" style="background-color: rgb(117, 5, 72);">five</div>
        <div class="six" style="background-color: rgb(186, 184, 20);">six</div>
        <div class="seven" style="background-color: rgb(160, 5, 131);">seven</div>
        <div class="eight" style="background-color: rgb(221, 19, 19);">eight</div>
        </div>
</body>
</html>
